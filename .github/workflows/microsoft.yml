name: Microsoft Store Tracker

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Run Microsoft Store tracker
        env:
          ITAD_API_KEY: ${{ secrets.ITAD_API_KEY }}
        run: python scripts/microsoft.py

      - name: Commit JSON
        run: |
          git config user.name "actions-user"
          git config user.email "actions@github.com"
          git add data/microsoft-store.json
          git diff --cached --quiet || git commit -m "Update Microsoft Store freebies"
          git push
